<!--
  TRMNL Private Plugin Markup — Prayer Times
  Paste this into your TRMNL Private Plugin markup editor.
-->

<div class="screen">
  <div class="view view--full">
    <div class="layout layout--col gap">

      <div style="width:92%;margin:0 auto;">
        <div class="row row--center">
          <span class="label label--small">{{ date }}</span>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;width:92%;margin:0 auto;">

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Fajr' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"
        >
          <span class="label {% if next_prayer == 'Fajr' %}text--white{% endif %}" style="font-size:22px;line-height:1.1;">Fajr</span>
          <span class="value {% if next_prayer == 'Fajr' %}text--white{% endif %}" style="font-size:24px;line-height:1.1;font-weight:425;">{{ fajr }}</span>
        </div>

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Sunrise' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"
        >
          <span class="label {% if next_prayer == 'Sunrise' %}text--white{% endif %}" style="font-size:22px;line-height:1.1;">Sunrise</span>
          <span class="value {% if next_prayer == 'Sunrise' %}text--white{% endif %}" style="font-size:24px;line-height:1.1;font-weight:425;">{{ sunrise }}</span>
        </div>

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Dhuhr' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"
        >
          <span class="label {% if next_prayer == 'Dhuhr' %}text--white{% endif %}" style="font-size:22px;line-height:1.1;">Dhuhr</span>
          <span class="value {% if next_prayer == 'Dhuhr' %}text--white{% endif %}" style="font-size:24px;line-height:1.1;font-weight:425;">{{ dhuhr }}</span>
        </div>

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Asr' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"

        </div>

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Maghrib' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"
        >
          <span class="label {% if next_prayer == 'Maghrib' %}text--white{% endif %}" style="font-size:22px;line-height:1.1;">Maghrib</span>
          <span class="value {% if next_prayer == 'Maghrib' %}text--white{% endif %}" style="font-size:24px;line-height:1.1;font-weight:425;">{{ maghrib }}</span>
        </div>

        <div
          style="display:flex;justify-content:space-between;align-items:center;width:100%;min-height:58px;box-sizing:border-box;padding:14px 18px;border-radius:16px;border:1px solid #d3d3d3;{% if next_prayer == 'Isha' %}background:#000;border-color:#000;color:#fff;{% else %}background:#fff;{% endif %}"

        </div>

      </div>

    </div>
  </div>
</div>
