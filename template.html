<!--
  TRMNL Private Plugin Markup — Prayer Times
  Paste this into your TRMNL Private Plugin markup editor.
-->

<div class="layout layout--col gap" style="width:100%;align-items:center;justify-content:flex-start;padding-top:8px;">
  <div class="list" style="width:100%;gap:14px;box-sizing:border-box;">
    <div class="item {% if next_prayer == 'Fajr' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">F</span>
      </div>
      <div class="content grow border--h-1" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;padding-bottom:8px;--border-1-h-color:transparent;--border-1-h-image:repeating-linear-gradient(to right,#d8d8d8 0 3px,transparent 3px 7px);--border-1-h-size:auto 1px;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Fajr' %}font-weight:600;{% endif %}">Fajr</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Fajr' %}600{% else %}425{% endif %};">{{ fajr }}</span>
      </div>
    </div>

    <div class="item {% if next_prayer == 'Sunrise' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">S</span>
      </div>
      <div class="content grow border--h-1" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;padding-bottom:8px;--border-1-h-color:transparent;--border-1-h-image:repeating-linear-gradient(to right,#d8d8d8 0 3px,transparent 3px 7px);--border-1-h-size:auto 1px;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Sunrise' %}font-weight:600;{% endif %}">Sunrise</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Sunrise' %}600{% else %}425{% endif %};">{{ sunrise }}</span>
      </div>
    </div>

    <div class="item {% if next_prayer == 'Dhuhr' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">D</span>
      </div>
      <div class="content grow border--h-1" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;padding-bottom:8px;--border-1-h-color:transparent;--border-1-h-image:repeating-linear-gradient(to right,{% if next_prayer == 'Dhuhr' %}#555{% else %}#d8d8d8{% endif %} 0 3px,transparent 3px 7px);--border-1-h-size:auto 1px;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Dhuhr' %}font-weight:600;{% endif %}">Dhuhr</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Dhuhr' %}600{% else %}425{% endif %};">{{ dhuhr }}</span>
      </div>
    </div>

    <div class="item {% if next_prayer == 'Asr' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">A</span>
      </div>
      <div class="content grow border--h-1" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;padding-bottom:8px;--border-1-h-color:transparent;--border-1-h-image:repeating-linear-gradient(to right,#d8d8d8 0 3px,transparent 3px 7px);--border-1-h-size:auto 1px;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Asr' %}font-weight:600;{% endif %}">Asr</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Asr' %}600{% else %}425{% endif %};">{{ asr }}</span>
      </div>
    </div>

    <div class="item {% if next_prayer == 'Maghrib' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">M</span>
      </div>
      <div class="content grow border--h-1" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;padding-bottom:8px;--border-1-h-color:transparent;--border-1-h-image:repeating-linear-gradient(to right,#d8d8d8 0 3px,transparent 3px 7px);--border-1-h-size:auto 1px;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Maghrib' %}font-weight:600;{% endif %}">Maghrib</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Maghrib' %}600{% else %}425{% endif %};">{{ maghrib }}</span>
      </div>
    </div>

    <div class="item {% if next_prayer == 'Isha' %}item--emphasis-3{% endif %}" style="align-items:center;line-height:1;">
      <div class="meta" style="width:18px;min-height:40px;">
        <span class="index">I</span>
      </div>
      <div class="content grow" style="display:flex;flex-direction:row;justify-content:space-between;align-items:baseline;gap:18px;width:100%;line-height:1;overflow:visible;">
        <span class="label" style="font-size:21px;line-height:1.1;{% if next_prayer == 'Isha' %}font-weight:600;{% endif %}">Isha</span>
        <span class="value" style="font-size:24px;line-height:1.1;font-weight:{% if next_prayer == 'Isha' %}600{% else %}425{% endif %};">{{ isha }}</span>
      </div>
    </div>
  </div>

</div>

<div class="title_bar">
  <span class="title">Prayer Times</span>
  <span class="instance">{{ date }} • {{ last_refreshed }}</span>
</div>
